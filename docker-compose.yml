services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: open-messenger-frontend
    environment:
      FRONTEND_PORT: 3001
      OPEN_MESSENGER_API_BASE_URL: http://api:8000
      OPEN_MESSENGER_ADMIN_API_TOKEN: dev-admin-token
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/healthz').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-messenger-api
    environment:
      OPEN_MESSENGER_ENVIRONMENT: dev
      OPEN_MESSENGER_CONTENT_BACKEND: redis
      OPEN_MESSENGER_METADATA_BACKEND: mysql
      OPEN_MESSENGER_REDIS_URL: redis://redis:6379/0
      OPEN_MESSENGER_MYSQL_DSN: mysql+pymysql://app:app@mysql:3306/open_messenger
      OPEN_MESSENGER_TRACING_ENABLED: "true"
      OPEN_MESSENGER_OTLP_TRACES_ENDPOINT: http://tempo:4318/v1/traces
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      tempo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: open-messenger-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: open-messenger-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: open_messenger
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: open-messenger-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy

  loki:
    image: grafana/loki:3.4.1
    container_name: open-messenger-loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.1
    container_name: open-messenger-promtail
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started

  tempo:
    image: grafana/tempo:2.7.1
    container_name: open-messenger-tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana:11.5.2
    container_name: open-messenger-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started

  test:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - test
    environment:
      OPEN_MESSENGER_ENVIRONMENT: test
      OPEN_MESSENGER_CONTENT_BACKEND: memory
      OPEN_MESSENGER_METADATA_BACKEND: memory
      PYTHONPATH: /app/backend
    command: ["pytest", "-q", "backend/tests"]

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - test
    environment:
      OPEN_MESSENGER_E2E_BASE_URL: http://api:8000
      OPEN_MESSENGER_E2E_ADMIN_TOKEN: dev-admin-token
    command: ["python", "scripts/e2e_native_api.py"]
    depends_on:
      api:
        condition: service_healthy

  e2e-matrix:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - test
    environment:
      OPEN_MESSENGER_E2E_BASE_URL: http://api:8000
      OPEN_MESSENGER_E2E_ADMIN_TOKEN: dev-admin-token
    command: ["python", "scripts/e2e_native_matrix.py"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
  loki_data:
  tempo_data:
  grafana_data:
